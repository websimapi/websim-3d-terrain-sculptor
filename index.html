<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Terrain Sculptor</title>
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@0.160.0",
            "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
            "simplex-noise": "https://esm.sh/simplex-noise@4.0.1"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="loading">
        <div class="spinner"></div>
        <span>Initializing Terrain Engine...</span>
    </div>

    <div class="ui-layer">
        <div class="top-bar pointer-events-auto">
            <button class="btn" id="btn-undo"> Undo</button>
            <button class="btn" id="btn-redo"> Redo</button>
            <button class="btn" id="btn-generate">Gen</button>
            <button class="btn" id="btn-clear">Clear</button>
            <button class="btn" id="btn-save">Save</button>
            <button class="btn" id="btn-load" onclick="document.getElementById('file-input').click()">Load</button>
            <button class="btn" id="btn-export-img">Export PNG</button>
            <button class="btn" id="btn-bug" title="Copy Debug Logs">🐛</button>
            <input type="file" id="file-input" accept=".json" style="display: none;">
        </div>

        <div class="bottom-panel pointer-events-auto" id="bottom-panel">
            <div id="panel-handle" class="panel-handle-area"><div class="handle-bar"></div></div>
            <div class="panel-content">
            <div class="control-group">
                <span class="control-label">Tools</span>
                <div class="tool-grid">
                    <button class="tool-btn active" data-tool="raise" id="tool-raise"><i>▲</i>Raise</button>
                    <button class="tool-btn" data-tool="lower" id="tool-lower"><i>▼</i>Lower</button>
                    <button class="tool-btn" data-tool="flatten" id="tool-flatten"><i>━</i>Flatten</button>
                    <button class="tool-btn" data-tool="smooth" id="tool-smooth"><i>~</i>Smooth</button>
                </div>
            </div>
            
            <div class="control-group">
                <span class="control-label">Brush Size</span>
                <input type="range" id="brush-size" min="1" max="20" value="5">
            </div>

            <div class="control-group">
                <span class="control-label">Brush Intensity</span>
                <input type="range" id="brush-intensity" min="1" max="100" value="20">
            </div>

            <div class="control-group">
                <span class="control-label">Textures</span>
                <div class="texture-grid" id="texture-palette">
                    <!-- Populated by JS -->
                </div>
            </div>
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
